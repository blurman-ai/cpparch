name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same ref to save minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (${{ matrix.compiler }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            apt-pkg: g++-13
          - compiler: clang-18
            cc: clang-18
            cxx: clang++-18
            apt-pkg: clang-18

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake ${{ matrix.apt-pkg }}

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/debug/_deps
          key: deps-${{ runner.os }}-${{ matrix.compiler }}-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt', 'src/CMakeLists.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ matrix.compiler }}-

      - name: Configure
        run: cmake -B build/debug -S . -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build/debug

      - name: Test
        working-directory: build/debug
        run: ctest --output-on-failure

      - name: Smoke test binary
        run: |
          ./build/debug/src/archcheck --version
          ./build/debug/src/archcheck --help
          # exit 2 on unknown argument:
          ./build/debug/src/archcheck unknown || test $? -eq 2
