# Example GitHub Actions job for users of archcheck: the canonical PR diff
# workflow. Reports what the PR does to the include graph; advisory-first —
# only gated regressions fail the check.
#
# Three visibility channels used here:
#   1. $GITHUB_STEP_SUMMARY — full report one click away from the run page.
#   2. Sticky PR comment via marocchino/sticky-pull-request-comment — live in
#      the PR conversation tab, updated in-place on every push (no spam).
#   3. Failed step → red Check automatically appears next to the PR.
#
# Copy into your project's `.github/workflows/` and pin ARCHCHECK_VERSION below
# to the release tag you want. The happy path downloads a prebuilt, checksummed
# binary (seconds); building from source is the commented fallback at the bottom.
#
# Exit codes (from `archcheck --diff`):
#   0 — no gated regression (advisory findings — added edges, chain/NCCD
#       growth, SATD, complexity drift — may still appear in the report)
#   1 — gated regression: new/grown include cycle or new god-header
#   2 — git / IO / config error
#
# Machine-readable variant: `archcheck --diff --format=json <revspec> .`
name: archcheck (PR diff)

on:
  pull_request:
    branches: [main, master]
  merge_group:  # required for GitHub Merge Queue; job name must match pull_request

jobs:
  archcheck-pr-diff:
    runs-on: ubuntu-latest
    # pull-requests: write is required for sticky-comment; read is sufficient
    # for the merge_group event (no PR to comment on there).
    permissions:
      pull-requests: write
    steps:
      - name: Checkout (shallow — default depth 1)
        uses: actions/checkout@v4
        # No fetch-depth: 0. archcheck --diff rebuilds the baseline graph from the
        # base SNAPSHOT (git diff = tree-vs-tree, git worktree = one tree checkout);
        # it never walks history or needs a merge-base. Fetch just that one snapshot:

      - name: Fetch baseline snapshot (depth 1, no history)
        run: |
          base="${{ github.base_ref }}"
          # merge_group carries the base in the event payload, not github.base_ref.
          [ -z "$base" ] && base="${{ github.event.merge_group.base_ref }}"
          base="${base#refs/heads/}"
          git fetch --no-tags --depth=1 origin "+refs/heads/$base:refs/remotes/origin/$base"
          echo "ARCHCHECK_BASE=origin/$base" >> "$GITHUB_ENV"

      - name: Install archcheck
        # Pinned release binary + checksum. Do not use a mutable `latest` in CI.
        env:
          ARCHCHECK_VERSION: v0.1.0
          GH_TOKEN: ${{ github.token }}  # required by `gh release download`
        run: |
          # -static: runs on any glibc (incl. ubuntu-22.04, Astra, Debian 10).
          # Drop "-static" for the smaller dynamic build (needs glibc >= 2.38).
          asset="archcheck-${ARCHCHECK_VERSION#v}-linux-x86_64-static.tar.gz"
          cd /tmp
          gh release download "$ARCHCHECK_VERSION" --repo blurman-ai/cpparch --pattern "$asset"
          gh release download "$ARCHCHECK_VERSION" --repo blurman-ai/cpparch --pattern "$asset.sha256"
          sha256sum -c "$asset.sha256"
          tar -xzf "$asset"
          sudo install -m 0755 archcheck /usr/local/bin/archcheck
          archcheck --version
        # Fallback — build from source (no release for your platform / pinned commit):
        #   - name: Build archcheck
        #     run: |
        #       cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release
        #       cmake --build build
        #   then call ./build/src/archcheck instead of archcheck below.

      - name: Run archcheck --diff
        id: archcheck
        run: |
          archcheck --diff "$ARCHCHECK_BASE..HEAD" . \
            | tee archcheck-diff.txt
        # exit 1 means regression found — keep going so we can post the comment
        continue-on-error: true

      - name: Publish report to Step Summary
        if: always()
        run: cat archcheck-diff.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Post sticky PR comment
        # merge_group has no associated PR — skip the comment step there.
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: archcheck-diff
          recreate: false
          path: archcheck-diff.txt

      - name: Fail the job if archcheck found a regression
        if: steps.archcheck.outcome == 'failure'
        run: exit 1
