# Cuts a GitHub Release with prebuilt archcheck binaries when a vX.Y.Z tag is
# pushed. Downstream CI then downloads a pinned, checksummed asset instead of
# building from source (3-4 min → seconds). See docs/ci_usage.md.
#
# Two assets per release (flat tarballs, extract to CWD → archcheck, LICENSE,
# README.install), each with a .sha256 for `sha256sum -c`:
#   archcheck-<version>-linux-x86_64.tar.gz          dynamic; needs glibc ≥ 2.38
#                                                    (ubuntu-24.04/latest), smaller
#   archcheck-<version>-linux-x86_64-static.tar.gz   fully static (-static); no
#                                                    glibc dep, runs anywhere incl
#                                                    Astra 1.7 / Debian 10 / RHEL 8
#
# To dry-run before a real release: push a throwaway tag (e.g. v0.0.0-rc1),
# inspect the prerelease, then delete the tag + release.
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # vX.Y.Z
      - 'v[0-9]+.[0-9]+.[0-9]+-*'      # vX.Y.Z-rc1 etc. → marked prerelease

permissions:
  contents: write                      # create release, upload assets

jobs:
  build:
    name: Build & package (linux-x86_64)
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      asset: ${{ steps.meta.outputs.asset }}
      asset_static: ${{ steps.meta.outputs.asset_static }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version from tag
        id: meta
        run: |
          tag="${GITHUB_REF_NAME}"          # e.g. v0.1.0 or v0.1.0-rc1
          version="${tag#v}"                # 0.1.0   or 0.1.0-rc1
          core="${version%%-*}"             # 0.1.0   (strip prerelease suffix)
          asset="archcheck-${version}-linux-x86_64.tar.gz"
          asset_static="archcheck-${version}-linux-x86_64-static.tar.gz"
          echo "tag=$tag"                   >> "$GITHUB_OUTPUT"
          echo "version=$version"           >> "$GITHUB_OUTPUT"
          echo "core=$core"                 >> "$GITHUB_OUTPUT"
          echo "asset=$asset"               >> "$GITHUB_OUTPUT"
          echo "asset_static=$asset_static" >> "$GITHUB_OUTPUT"
          # Mark rc/alpha/beta tags as prerelease.
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake g++-13

      - name: Build (dynamic + static)
        env:
          CC: gcc-13
          CXX: g++-13
        # dynamic: -static-libstdc++ -static-libgcc drops the libstdc++/libgcc_s
        #   version dependency, leaving only glibc — small binary for modern runners.
        # static:  adds -static → libc statically linked too, no glibc dependency,
        #   runs on any kernel ≥3.2 (Astra 1.7 / Debian 10 / RHEL 8). archcheck
        #   forks `git` and only touches the filesystem (no NSS/getpwnam/getaddrinfo),
        #   so the usual static-glibc caveats do not apply.
        run: |
          cmake -B build/release -S . -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
          cmake --build build/release
          cmake -B build/static -S . -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libstdc++ -static-libgcc"
          cmake --build build/static

      - name: Verify versions and linkage
        run: |
          want="archcheck ${{ steps.meta.outputs.core }}"
          for bin in build/release/src/archcheck build/static/src/archcheck; do
            got="$("$bin" --version)"
            echo "$bin: $got (expect: $want)"
            test "$got" = "$want"          # CMake VERSION can't hold a prerelease suffix
          done
          echo "--- dynamic ldd ---"; ldd build/release/src/archcheck || true
          echo "--- static ldd (must NOT be dynamic) ---"
          if ldd build/static/src/archcheck 2>&1 | grep -q "not a dynamic executable"; then
            echo "ok: static binary has no dynamic dependencies"
          else
            echo "ERROR: static binary is still dynamically linked"; exit 1
          fi

      - name: Package assets
        run: |
          version="${{ steps.meta.outputs.version }}"
          pack() {            # pack <binary> <asset-name> <compat-note>
            local bin="$1" asset="$2" compat="$3"
            local stage; stage="$(mktemp -d)"
            install -m 0755 "$bin" "$stage/archcheck"
            cp LICENSE "$stage/LICENSE"
            cat > "$stage/README.install" <<EOF
          archcheck ${version} — prebuilt CLI for Linux x86_64

          Install:
            sudo install -m 0755 archcheck /usr/local/bin/archcheck
            archcheck --version

          ${compat}

          Verify checksum before use:
            sha256sum -c ${asset}.sha256

          License: Apache-2.0 (see LICENSE).
          Project: https://github.com/blurman-ai/cpparch
          EOF
            tar -C "$stage" -czf "$asset" archcheck LICENSE README.install
            sha256sum "$asset" > "$asset.sha256"
          }
          pack build/release/src/archcheck "${{ steps.meta.outputs.asset }}" \
            "Dynamic build (ubuntu-24.04, gcc-13). Requires glibc >= 2.38 — runs on ubuntu-24.04/latest, NOT ubuntu-22.04 or older. For older glibc use the -static asset."
          pack build/static/src/archcheck "${{ steps.meta.outputs.asset_static }}" \
            "Fully static build (-static). No glibc dependency; runs on any Linux x86_64 kernel >= 3.2, including Astra 1.7 / Debian 10 / RHEL 8. Larger but maximally portable."
          echo "--- packaged ---"; ls -l archcheck-*.tar.gz*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-asset
          path: archcheck-*.tar.gz*
          retention-days: 7
          if-no-files-found: error

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          asset="${{ steps.meta.outputs.asset }}"
          asset_static="${{ steps.meta.outputs.asset_static }}"
          prerelease_flag=""
          if [ "${{ steps.meta.outputs.prerelease }}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi
          notes="$(cat <<EOF
          Prebuilt \`archcheck\` for Linux x86_64.

          | Asset | Use | glibc |
          |-------|-----|-------|
          | \`$asset\` | modern CI (ubuntu-24.04/latest), smaller | needs ≥ 2.38 |
          | \`$asset_static\` | old / unknown distros (Astra 1.7, Debian 10, RHEL 8) | none (fully static) |

          ## Install in CI (pinned + checksummed)
          \`\`\`bash
          cd /tmp
          asset="$asset"                       # or "$asset_static" for old glibc
          # Keep original filenames so the .sha256 manifest matches as-is.
          gh release download "$tag" --repo blurman-ai/cpparch --pattern "\$asset"
          gh release download "$tag" --repo blurman-ai/cpparch --pattern "\$asset.sha256"
          sha256sum -c "\$asset.sha256"
          tar -xzf "\$asset"
          sudo install -m 0755 archcheck /usr/local/bin/archcheck
          archcheck --version
          \`\`\`

          Pin by tag + verify checksum. Do not use a mutable \`latest\` in CI.
          See docs/ci_usage.md for the full guide.

          Full changelog: see [CHANGELOG.md](https://github.com/blurman-ai/cpparch/blob/$tag/CHANGELOG.md).
          EOF
          )"
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "archcheck $tag" \
            --notes "$notes" \
            $prerelease_flag \
            "$asset" "$asset.sha256" "$asset_static" "$asset_static.sha256"

  smoke:
    name: Smoke test released assets (clean runner)
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Download + verify + run both released assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          ASSET: ${{ needs.build.outputs.asset }}
          ASSET_STATIC: ${{ needs.build.outputs.asset_static }}
        run: |
          cd /tmp
          for a in "$ASSET" "$ASSET_STATIC"; do
            echo "::group::smoke $a"
            rm -rf t && mkdir t && cd t
            gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$a"
            gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$a.sha256"
            sha256sum -c "$a.sha256"
            tar -xzf "$a"
            ./archcheck --version
            ./archcheck --help >/dev/null
            mkdir -p emptyproj && ./archcheck emptyproj   # clean tree → exit 0
            cd /tmp
            echo "::endgroup::"
          done

  smoke-oldglibc:
    name: Smoke static asset on old glibc (debian:10 ≈ Astra 1.7)
    needs: build
    runs-on: ubuntu-24.04
    # debian:10 (buster) ships glibc 2.28 — the same base as Astra Linux 1.7.
    # Proves the -static asset runs where the dynamic one cannot.
    container: debian:10
    steps:
      - name: Fetch built assets
        uses: actions/download-artifact@v7
        with:
          name: release-asset
      - name: Verify glibc is old, then run the static binary
        env:
          ASSET_STATIC: ${{ needs.build.outputs.asset_static }}
        run: |
          echo "--- container glibc ---"; ldd --version | head -1
          sha256sum -c "$ASSET_STATIC.sha256"
          tar -xzf "$ASSET_STATIC"
          ./archcheck --version          # would fail with GLIBC_2.38 if dynamic
          ./archcheck --help >/dev/null
          mkdir -p emptyproj && ./archcheck emptyproj
          echo "ok: static binary runs on glibc 2.28"
